AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy Stable Diffusion Web UI by Automatic1111

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: sd-webui-sg
      GroupDescription: Security group for SD WebUI EC2 instance
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 7860
          ToPort: 7860
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: g5.2xlarge
      KeyName: !Ref KeyName
      ImageId: ami-0f2afc310ea592067
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 100
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: sd-web-ui-cf
      SecurityGroups:
        - Ref: SecurityGroup
      UserData:
        'Fn::Base64': |
          #!/bin/bash
          set -ex
          exec > /var/log/user-data.log 2>&1
          export GIT_TERMINAL_PROMPT=0
          export HOME=/home/ec2-user

          # Install git and wget
          dnf install -y git wget

          # Clone AUTOMATIC1111 webui repo
          cd /home/ec2-user
          sudo -u ec2-user git clone https://github.com/AUTOMATIC1111/stable-diffusion-webui.git

          # Download setup.sh and webui-user.sh from your fork
          wget https://raw.githubusercontent.com/danbornman/stable-diffusion-webui/master/setup.sh \
            -O /home/ec2-user/stable-diffusion-webui/setup.sh
          wget https://raw.githubusercontent.com/danbornman/stable-diffusion-webui/master/webui-user.sh \
            -O /home/ec2-user/stable-diffusion-webui/webui-user.sh

          chmod +x /home/ec2-user/stable-diffusion-webui/setup.sh
          chown ec2-user:ec2-user /home/ec2-user/stable-diffusion-webui/setup.sh
          chown ec2-user:ec2-user /home/ec2-user/stable-diffusion-webui/webui-user.sh

          # Run setup
          bash /home/ec2-user/stable-diffusion-webui/setup.sh

  MyEIP:
    Type: AWS::EC2::EIP

  MyEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt MyEIP.AllocationId
      InstanceId: !Ref EC2Instance
