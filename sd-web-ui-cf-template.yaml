AWSTemplateFormatVersion: '2010-09-09'
Description: A CloudFormation template to deploy the Stable Diffusion Web UI by Automatic1111

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: sd-webui-sg
      GroupDescription: Security group for SD WebUI EC2 instance
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 7860
          ToPort: 7860
          CidrIp: 0.0.0.0/0
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: g4dn.xlarge
      ImageId: ami-02f986bab3de34d0d
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30        # enough for OS and drivers
            VolumeType: gp3
        - DeviceName: /dev/sdb    # separate 300GB data volume
          Ebs:
            VolumeSize: 300
            VolumeType: gp3
      SecurityGroups:
        - Ref: SecurityGroup
      UserData:
        'Fn::Base64': |
          #!/bin/bash
          set -ex
          exec > /var/log/user-data.log 2>&1
          export GIT_TERMINAL_PROMPT=0

          # Format and mount the data volume
          mkfs -t xfs /dev/nvme1n1
          mkdir -p /data
          mount /dev/nvme1n1 /data

          # Make mount permanent
          UUID=$(blkid -s UUID -o value /dev/nvme1n1)
          echo "UUID=$UUID /data xfs defaults,nofail 0 2" >> /etc/fstab

          # Set ownership
          chown -R ec2-user:ec2-user /data

          # Rest of your setup...
          cd /data
          git clone https://github.com/danbornman/stable-diffusion-webui.git
          bash /data/stable-diffusion-webui/setup.sh
  MyEIP:
    Type: AWS::EC2::EIP
  MyEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt MyEIP.AllocationId
      InstanceId: !Ref EC2Instance
